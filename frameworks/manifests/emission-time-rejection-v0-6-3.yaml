# Deliverable manifest: emission-time-rejection-v0-6-3
#
# Third production llm-dev-v1.1 run (fourth lifecycle total, counting PROV-1).
# Slice 3 of the Tier 4 Proposal Layer Shipping Plan
# (tier4_discovery_proposal_layer_spec.md §15.3).
#
# Two features:
#   1. Emission-time rejection memory — pipeline refuses to enqueue proposals
#      matching a previously rejected basis_fingerprint.
#   2. Pending-queue cap enforcement — 20 queued proposals per producer per
#      engagement (per library).
#
# Both features write lifecycle_state: "suppressed" — first usage of this state.
#
# Critical fix: preserve rejected proposals across enrich runs (line 860
# overwrites _llm_metadata.enrich wholesale; rejected entries set by
# folio links reject are lost without preservation).
#
# Pre-A is INHERITED from the parent proposal doc (§15.3 pre-ratified).
# Adversarial lens: codex (user directive, validated across 3 prior slices).

