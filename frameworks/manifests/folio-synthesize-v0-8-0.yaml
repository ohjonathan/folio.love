  - id: G-test-1
    category: test
    description: "Full scope-relevant test suites pass (synthesize + trust + graph + digest regression guards)."
    verification:
      command: "python3 -m pytest tests/test_synthesize.py tests/test_cli_synthesize.py tests/test_trust.py tests/test_graph.py tests/test_graph_cli.py tests/test_digest.py tests/test_cli_digest.py -q"
      expect: "exit-0"
  - id: G-test-2
    category: test
    description: "Synthesize-specific tests pass (unit + CLI integration)."
    verification:
      command: "python3 -m pytest tests/test_synthesize.py tests/test_cli_synthesize.py -q"
      expect: "exit-0"
  - id: G-scope-1
    category: scope
    description: "No changes to forbidden paths (baseline: Phase 0 commit 831a741; Phase 0 helper-promotion changes are the scope-lock floor, not in-slice edits)."
    verification:
      command: "git diff --name-only 831a741..HEAD | grep -E '^(folio/graph\\.py|folio/tracking/trust\\.py|folio/digest\\.py|folio/enrich\\.py|folio/links\\.py|folio/provenance\\.py|folio/tracking/entities\\.py|folio/tracking/registry\\.py|folio/tracking/sources\\.py|folio/tracking/versions\\.py|folio/pipeline/|docs/specs/tier4_|docs/product/|docs/architecture/|frameworks/llm-dev-v1/|AGENTS\\.md|Ontos_Context_Map\\.md)'"
      expect: "exit-nonzero"
  - id: G-scope-2
    category: scope
    description: "Forbidden symbols absent from scope-lock paths."
    verification:
      command: "grep -rE 'pickle\\.loads|eval\\(' folio/synthesize.py"
      expect: "exit-nonzero"
  - id: G-scope-3
    category: scope
    description: "folio/cli.py changes bounded to the synthesize command registration (50-line cap on added+removed; baseline 831a741 per G-scope-1 discipline; F-058 headroom mitigation applied)."
    verification:
      command: "git diff --numstat 831a741..HEAD -- folio/cli.py | awk '{ if ($1 > 50 || $2 > 50) exit 1 } END { print \"ok\" }'"
      expect: "literal:ok"
  - id: G-scope-4
    category: scope
    description: "No direct LLM imports in folio/synthesize.py (MVP invariant — §2.5 non-goal). MIN-2: file-existence guard prevents false pass when the module is absent."
    verification:
      command: "test -f folio/synthesize.py && ! grep -E 'from folio.llm|import folio.llm|from openai|import openai|from anthropic|import anthropic' folio/synthesize.py"
      expect: "exit-0"
  - id: G-cardinality-1
    category: cardinality
    description: "synthesize command registered on the Click CLI."
    verification:
      command: "python3 -c 'from folio.cli import cli; assert \"synthesize\" in cli.commands, sorted(cli.commands.keys()); print(1)'"
      expect: "eq:1"
  - id: G-cardinality-2
    category: cardinality
    description: "Shared envelope schema_version constant exported."
    verification:
      command: "python3 -c 'from folio.synthesize import SCHEMA_VERSION; assert SCHEMA_VERSION == \"1.0\", SCHEMA_VERSION; print(1)'"
      expect: "eq:1"
  - id: G-cardinality-3
    category: cardinality
    description: "Shared-consumer invariant: folio.synthesize and folio.graph both use folio.tracking.trust.derive_trust_status (identity check)."
    verification:
      command: "python3 -c 'from folio import synthesize as s, graph as g; from folio.tracking import trust as t; assert s.derive_trust_status is t.derive_trust_status; assert g.derive_trust_status is t.derive_trust_status; print(1)'"
      expect: "eq:1"
  - id: G-cardinality-4
    category: cardinality
    description: "Shared-consumer invariant unit test passes (class-level test in tests/test_trust.py)."
    verification:
      command: "python3 -m pytest tests/test_trust.py::TestSharedConsumerInvariant -q"
      expect: "exit-0"
  - id: G-test-3
    category: test
    description: "Envelope shape invariants (E1-E7 per v1.1 §3.3) pass — producer-side exact key assertion + consumer-side tolerate-unknown discipline."
    verification:
      command: "python3 -m pytest tests/test_cli_synthesize.py -k 'envelope' -q"
      expect: "exit-0"
  - id: G-test-4
    category: test
    description: "CB-1 / CB-2 closure regression tests pass (SuppressionCounts field routing, 11 shared-contract keys, schema_gate_result null, input_fingerprint legacy alias, per-view helper call, transitive LLM import guard, read-only invariant)."
    verification:
