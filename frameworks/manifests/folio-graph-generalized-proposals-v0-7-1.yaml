# Deliverable manifest: folio-graph-generalized-proposals-v0-7-1
#
# Retrofit deliverable (Shipping Plan §15.6 slice 6b sub-slice 1 of 3):
# formalize folio/graph.py's consumption of the shared proposal contract from
# docs/specs/tier4_discovery_proposal_layer_spec.md §5. First of three
# sub-deliverables; validates the shared-contract shape on existing code
# before the greenfield `folio synthesize` (v0.8.0) and `folio search`
# (v0.9.0) sub-slices land.
#
# Pre-A INHERITED from tier4_discovery_proposal_layer_spec.md §5 (Proposal
# Object Contract), §15.6 (Shared-consumer expansion), and §15.7 (Contract:
# slice manifests narrow, they don't reinterpret). Phase A authors a
# narrowing implementation spec per §15.7 — declares which §§ this slice
# implements vs. defers. F-049 compliance: cite sections by number and name,
# not paraphrase.
#
# Codex assigned to adversarial role per v1.2.0 must-differ-provider
# invariant (author family = claude → adversarial family ≠ claude*).
#
# Adopter-only contract in effect: no bundle edits. Bundle at
# frameworks/llm-dev-v1/ remains byte-identical to johnny-os@e40b5c3
# (v1.2.0, resynced via PR #59).

manifest_version: "1.2.0"
id: folio-graph-generalized-proposals-v0-7-1
slug: folio-graph-generalized-proposals
summary: "Retrofit folio/graph.py to formally consume the shared proposal contract (§5) — surface trust_status, proposal_type, and evidence/reason fields in `graph doctor` findings; generalize the proposal-finding renderer so future proposal_types (entity-merge, diagram-archetype) flow through the same surface without dispatch edits. First of three Shipping Plan §15.6 sub-slices; greenfield synthesize + search follow in v0.8.0 and v0.9.0."

user_facing: true

# Pre-A inheritance note (v1.2.0 schema strictness):
# pre_a.entry {proposal|triage|validation} declares a NEW pre-A artifact.
# This slice inherits pre-A from the ratified parent spec
# docs/specs/tier4_discovery_proposal_layer_spec.md rev 5 — §5 (Proposal
# Object Contract, 9 required fields), §15.6 (Shared-consumer expansion —
# folio graph as one of three consumers), §15.7 (narrow-don't-reinterpret).
# Phase A will narrow those §§ into an implementation spec per §15.7.
# The pre_a block is omitted (optional under schema) to avoid misclassifying
# inherited ratification as a new proposal/triage/validation entry point.
# F-049 compliance: §§ named not paraphrased.

owners:
  - "Jonathan Oh (ohjonathan)"

scope:
  allowed_paths:
    # Retrofit scope
    - folio/graph.py
    # v1.1 scope broaden (post B.1 Round 1 blocker closure):
    # folio/cli.py:2016-2021 stdout template must be updated when subject_id
    # frees to §5 semantics. Bounded to the pending-finding renderer loop;
    # G-scope-3 enforces no unrelated cli.py edits.
    - folio/cli.py
    # Tests
    - tests/test_graph_cli.py
    - tests/test_graph.py
    # Documentation
    - CHANGELOG.md
    - docs/specs/v0.7.1_folio_graph_generalized_proposals_spec.md
    - docs/validation/v0.7.1_spec_peer_claude-sub.md
    - docs/validation/v0.7.1_spec_peer_claude-sub_round2.md
    - docs/validation/v0.7.1_spec_alignment_gemini.md
    - docs/validation/v0.7.1_spec_adversarial_codex.md
    - docs/validation/v0.7.1_spec_adversarial_codex_round2.md
    - docs/validation/v0.7.1_spec_product_claude-sub.md
    - docs/validation/v0.7.1_spec_product_claude-sub_round2.md
    - docs/validation/v0.7.1_spec_canonical_verdict.md
    - docs/validation/v0.7.1_spec_canonical_verdict_round2.md
    - docs/validation/v0.7.1_code_peer_claude-sub.md
    - docs/validation/v0.7.1_code_alignment_gemini.md
    - docs/validation/v0.7.1_code_adversarial_codex.md
    - docs/validation/v0.7.1_code_product_claude-sub.md
    - docs/validation/v0.7.1_code_canonical_verdict.md
    - docs/validation/v0.7.1_d4_fix_summary.md
    - docs/validation/v0.7.1_d5_verification_gemini.md
    - docs/validation/v0.7.1_d5_verification_codex.md
    - docs/validation/v0.7.1_d5_verification_claude-sub.md
    - docs/validation/v0.7.1_d6_final_approval.md
    - docs/retros/llm-dev-v1-adoption.md
    - frameworks/manifests/framework-learnings-v1.1-adoption.md
  forbidden_paths:
    # Not in scope for this retrofit
    - folio/enrich.py
    - folio/digest.py
    - folio/links.py
    - folio/provenance.py
    - folio/tracking/entities.py
    - folio/pipeline/
    # Other Tier-4 spec documents (referenced, not edited)
    - docs/specs/tier4_discovery_proposal_layer_spec.md
    - docs/specs/tier4_digest_design_spec.md
    # Adopter-only contract
    - frameworks/llm-dev-v1/
    - docs/product/
    - docs/architecture/
    - ontos/
    - .github/
    - Ontos_Context_Map.md
    - AGENTS.md
  forbidden_symbols:
    - "pickle.loads"
    - "eval("
  cardinality_assertions:
    # v1.1 (post B.1 ADV-SF3 closure): substring inspect.getsource gates are
    # spoofable by comments/docstrings (codex reproduced). Replaced with
    # fixture-based runtime assertions via a dedicated test that is ALSO
    # referenced by G-cardinality-1/2 gates.
    - name: "pending-proposal findings carry all 11 shared-contract emitted keys (runtime fixture)"
      command: "python3 -m pytest tests/test_graph.py::test_graph_doctor_fixture_mandatory_contract_invariant -q"
      expect: "exit-0"
    - name: "pending-proposal findings carry the new proposal_id key (runtime fixture)"
      command: "python3 -m pytest tests/test_graph.py::test_graph_doctor_proposal_id_preserves_view_proposal_id -q"
      expect: "exit-0"
    - name: "graph CLI surface unchanged (status + doctor only)"
      command: "python3 -c 'from folio.cli import cli; g = cli.commands[\"graph\"]; names = sorted(g.commands.keys()); assert names == [\"doctor\", \"status\"], names; print(1)'"
      expect: "eq:1"

artifacts:
  spec:              "docs/specs/v0.7.1_folio_graph_generalized_proposals_spec.md"
  family_verdict:    "docs/validation/v0.7.1_<phase>_<role>_<family>.md"
  canonical_verdict: "docs/validation/v0.7.1_<phase>_canonical_verdict.md"
  product_verdict:   "docs/validation/v0.7.1_<phase>_product_<family>.md"
  fix_summary:       "docs/validation/v0.7.1_d4_fix_summary.md"
  verification:      "docs/validation/v0.7.1_d5_verification_<family>.md"
  final_approval:    "docs/validation/v0.7.1_d6_final_approval.md"
  retro:             "docs/retros/llm-dev-v1-adoption.md"

