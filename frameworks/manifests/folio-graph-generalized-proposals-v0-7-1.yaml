# Model assignments — same pattern as slice 7 (v0.7.0). v1.2.0 invariant:
# adversarial family must NOT share provider with author (claude ≠ codex — OK).
model_assignments:
  - phase: "A"
    assignments:
      claude: spec-author
  - phase: "B.1"
    assignments:
      codex:      adversarial
      gemini:     alignment
      claude-sub: peer
  - phase: "B.1"
    assignments:
      claude-sub: product
  - phase: "B.2"
    assignments:
      codex:      adversarial
      gemini:     alignment
      claude-sub: peer
  - phase: "B.2"
    assignments:
      claude-sub: product
  - phase: "B.3"
    assignments:
      codex: meta-consolidator
  - phase: "C"
    assignments:
      claude: implementation-author
  - phase: "D.2"
    assignments:
      codex:      adversarial
      gemini:     alignment
      claude-sub: peer
  - phase: "D.2"
    assignments:
      claude-sub: product
  - phase: "D.3"
    assignments:
      codex: meta-consolidator
  - phase: "D.4"
    assignments:
      claude: fix-author
  # v1.2.0 review-phase invariant: D.5 requires ≥3 non-author engineering
  # families (verify-p3). Slice 7 (1.1.0) got away with gemini-only; 1.2.0
  # tightens to match B.1/D.2.
  - phase: "D.5"
    assignments:
      gemini:     verifier
      codex:      verifier
      claude-sub: verifier
  - phase: "D.6"
    assignments:
      codex: final-approval
  - phase: "E"
    assignments:
      claude: retro

cli_capability_matrix:
  claude:      { shell: true, git: true, test_runner: true,  doc_index: true  }
  claude-sub:  { shell: true, git: true, test_runner: true,  doc_index: true  }
  codex:       { shell: true, git: true, test_runner: true,  doc_index: false }
  gemini:      { shell: true, git: false, test_runner: false, doc_index: false }

smoke_checks:
  - phase: "C"
    checks:
      - name: "folio imports"
        command: "python3 -c 'import folio'"
        expect: "exit-0"
      - name: "graph module imports"
        command: "python3 -c 'import folio.graph'"
        expect: "exit-0"
      - name: "graph + scope-relevant test suites"
        command: "python3 -m pytest tests/test_graph_cli.py tests/test_graph.py tests/test_links_cli.py -q"
        expect: "exit-0"
      - name: "lint clean on scope paths"
        command: "python3 -m ruff check folio/graph.py"
        expect: "exit-0"
  - phase: "D.6"
    checks:
      - name: "branch ahead of main"
        command: "git rev-list --count main..HEAD"
        expect: "gte:1"

regression_guards:
  - name: "Slice 1 links tests"
    command: "python3 -m pytest tests/test_links_cli.py -q"
    owns_deliverable_id: "proposal-review-hardening-v0-6-0"
  - name: "Slice 4 trust-gated tests"
    command: "python3 -m pytest tests/test_links_cli.py tests/test_graph_cli.py -q"
    owns_deliverable_id: "trust-gated-surfacing-v0-6-4"
  - name: "Slice 6a entity rejection memory tests"
    command: "python3 -m pytest tests/test_entities.py tests/test_cli_entities.py -q"
    owns_deliverable_id: "entity-merge-rejection-memory-v0-6-5"
  - name: "Slice 7 digest tests"
    command: "python3 -m pytest tests/test_digest.py tests/test_cli_digest.py -q"
    owns_deliverable_id: "folio-digest-v0-7-0"

gate_prerequisites:
  - id: G-test-1
    category: test
    description: "Full scope-relevant test suites pass."
    verification:
      command: "python3 -m pytest tests/test_graph_cli.py tests/test_graph.py tests/test_links_cli.py tests/test_entities.py tests/test_cli_entities.py tests/test_digest.py tests/test_cli_digest.py -q"
      expect: "exit-0"
  - id: G-test-2
    category: test
    description: "Graph-specific tests pass."
    verification:
      command: "python3 -m pytest tests/test_graph_cli.py tests/test_graph.py -q"
      expect: "exit-0"
  - id: G-scope-1
    category: scope
    description: "No changes to forbidden paths."
    verification:
      command: "git diff --name-only main..HEAD | grep -E '^(folio/enrich\\.py|folio/digest\\.py|folio/links\\.py|folio/provenance\\.py|folio/tracking/entities\\.py|folio/pipeline/|docs/specs/tier4_|docs/product/|docs/architecture/|frameworks/llm-dev-v1/|AGENTS\\.md|Ontos_Context_Map\\.md)'"
      expect: "exit-nonzero"
  - id: G-scope-2
    category: scope
    description: "Forbidden symbols absent from scope-lock paths."
    verification:
      command: "grep -rE 'pickle\\.loads|eval\\(' folio/graph.py"
      expect: "exit-nonzero"
  - id: G-cardinality-1
    category: cardinality
    description: "Pending-proposal findings carry all 11 shared-contract emitted keys (runtime fixture; replaces v1.0 substring gate per ADV-SF3)."
    verification:
      command: "python3 -m pytest tests/test_graph.py::test_graph_doctor_fixture_mandatory_contract_invariant -q"
      expect: "exit-0"
  - id: G-cardinality-2
    category: cardinality
    description: "Pending-proposal findings carry the new proposal_id key preserving view.proposal.proposal_id (runtime fixture; replaces v1.0 substring gate per ADV-SF3)."
    verification:
      command: "python3 -m pytest tests/test_graph.py::test_graph_doctor_proposal_id_preserves_view_proposal_id -q"
      expect: "exit-0"
  - id: G-cardinality-3
    category: cardinality
    description: "graph CLI surface unchanged (status + doctor only — no new subcommands)."
    verification:
      command: "python3 -c 'from folio.cli import cli; g = cli.commands[\"graph\"]; names = sorted(g.commands.keys()); assert names == [\"doctor\", \"status\"], names; print(1)'"
      expect: "eq:1"
  - id: G-test-3
    category: test
    description: "CLI stdout regression guard — pending proposal renders proposal_id, not literal 'None' (closes PRD-1 / P-1)."
    verification:
      command: "python3 -m pytest tests/test_graph_cli.py::test_graph_doctor_cli_stdout_renders_proposal_id -q"
      expect: "exit-0"
  - id: G-scope-3
    category: scope
    description: "folio/cli.py changes bounded to the pending-finding stdout renderer (lines 2016-2021 + adjacent helper)."
    verification:
      command: "git diff --numstat main..HEAD -- folio/cli.py | awk '{ if ($1 > 25 || $2 > 25) exit 1 } END { print \"ok\" }'"
      expect: "literal:ok"
  - id: G-verdict-1
    category: verdict-presence
    description: "B.3 canonical spec verdict exists."
    verification:
      command: "test -f docs/validation/v0.7.1_spec_canonical_verdict.md"
      expect: "exit-0"
  - id: G-verdict-2
    category: verdict-presence
    description: "D.3 canonical code verdict exists."
    verification:
      command: "test -f docs/validation/v0.7.1_code_canonical_verdict.md"
      expect: "exit-0"
  - id: G-verdict-3
    category: verdict-presence
    description: "Product verdicts (B.1 + D.2) exist."
    verification:
      command: "ls docs/validation/v0.7.1_{spec,code}_product_claude-sub.md 2>/dev/null | wc -l | tr -d ' '"
      expect: "gte:2"
  - id: G-blocker-1
    category: blocker-closure
    description: "D.5 verification exists (at least one per-family file)."
    verification:
      command: "ls docs/validation/v0.7.1_d5_verification_*.md 2>/dev/null | wc -l | tr -d ' '"
      expect: "gte:1"
  - id: G-branch-1
    category: branch
    description: "Working tree clean."
    verification:
      command: "git status --porcelain | grep -v '^??'"
      expect: "empty"
  - id: G-branch-2
    category: branch
    description: "Feature branch ahead of main."
    verification:
      command: "git rev-list --count main..HEAD"
      expect: "gte:1"

