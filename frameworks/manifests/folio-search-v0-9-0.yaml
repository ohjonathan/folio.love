      - name: "folio imports"
        command: "python3 -c 'import folio'"
        expect: "exit-0"
      - name: "search module imports"
        command: "python3 -c 'import folio.search'"
        expect: "exit-0"
      - name: "search + scope-relevant test suites"
        command: "python3 -m pytest tests/test_search.py tests/test_cli_search.py tests/test_trust.py tests/test_synthesize.py tests/test_cli_synthesize.py tests/test_graph.py tests/test_graph_cli.py -q"
        expect: "exit-0"
      - name: "lint clean on scope paths"
        command: "python3 -m ruff check folio/search.py"
        expect: "exit-0"
      - name: "folio search --help works (smoke)"
        command: "python3 -m folio search --help"
        expect: "exit-0"
  - phase: "D.6"
    checks:
      - name: "branch ahead of main"
        command: "git rev-list --count main..HEAD"
        expect: "gte:1"

