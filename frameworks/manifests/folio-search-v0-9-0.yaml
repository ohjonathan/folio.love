    category: test
    description: "Full scope-relevant test suites pass (search + synthesize + graph + trust + digest regression guards)."
    verification:
      command: "python3 -m pytest tests/test_search.py tests/test_cli_search.py tests/test_synthesize.py tests/test_cli_synthesize.py tests/test_trust.py tests/test_graph.py tests/test_graph_cli.py tests/test_digest.py tests/test_cli_digest.py -q"
      expect: "exit-0"
  - id: G-test-2
    category: test
    description: "Search-specific tests pass (unit + CLI integration)."
    verification:
      command: "python3 -m pytest tests/test_search.py tests/test_cli_search.py -q"
      expect: "exit-0"
  - id: G-scope-1
    category: scope
    description: "No changes to forbidden paths (baseline: main@741f0b6; NO Phase 0 floor in this slice — Phase A is the first commit)."
    verification:
      command: "git diff --name-only 741f0b6..HEAD | grep -E '^(folio/graph\\.py|folio/synthesize\\.py|folio/tracking/trust\\.py|folio/links\\.py|folio/digest\\.py|folio/enrich\\.py|folio/provenance\\.py|folio/tracking/entities\\.py|folio/tracking/registry\\.py|folio/tracking/sources\\.py|folio/tracking/versions\\.py|folio/pipeline/|docs/specs/tier4_|docs/specs/v0\\.7\\.1_|docs/specs/v0\\.8\\.0_|docs/product/|docs/architecture/|frameworks/llm-dev-v1/|AGENTS\\.md|Ontos_Context_Map\\.md)'"
      expect: "exit-nonzero"
  - id: G-scope-2
    category: scope
    description: "Forbidden symbols absent from scope-lock paths."
    verification:
      command: "grep -rE 'pickle\\.loads|eval\\(' folio/search.py"
      expect: "exit-nonzero"
  - id: G-scope-3
    category: scope
    description: "folio/cli.py changes bounded to the search command registration (100-line cap on added; baseline 741f0b6). F-058 headroom mitigation invoked at Phase C: search's CLI surface is larger than synthesize's (required QUERY callback, an additional --producer option, IntRange validator, foreshadow-v0.9.1 tip in docstring) → needs ~90 lines vs synthesize's ~40. Cap raised from the v0.8.0 template's 50 to 100. This is spec-side expansion, not scope creep: no new file paths, no forbidden-path edits, same command footprint."
    verification:
      command: "git diff --numstat 741f0b6..HEAD -- folio/cli.py | awk '{ if ($1 > 100 || $2 > 100) exit 1 } END { print \"ok\" }'"
      expect: "literal:ok"
  - id: G-scope-4
    category: scope
    description: "No direct LLM imports in folio/search.py (MVP invariant — §2.5 non-goal). MIN-2: file-existence guard prevents false pass when the module is absent."
    verification:
      command: "test -f folio/search.py && ! grep -E 'from folio.llm|import folio.llm|from openai|import openai|from anthropic|import anthropic' folio/search.py"
      expect: "exit-0"
  - id: G-cardinality-1
    category: cardinality
    description: "search command registered on the Click CLI."
    verification:
      command: "python3 -c 'from folio.cli import cli; assert \"search\" in cli.commands, sorted(cli.commands.keys()); print(1)'"
      expect: "eq:1"
  - id: G-cardinality-2
    category: cardinality
    description: "Shared envelope schema_version constant exported and bumped to 1.1."
    verification:
      command: "python3 -c 'from folio.search import SCHEMA_VERSION; assert SCHEMA_VERSION == \"1.1\", SCHEMA_VERSION; print(1)'"
      expect: "eq:1"
  - id: G-cardinality-3
    category: cardinality
    description: "Shared-consumer invariant at N=3 (graph + synthesize + search all use folio.tracking.trust.derive_trust_status; identity check)."
    verification:
      command: "python3 -c 'from folio import search as se, synthesize as sy, graph as g; from folio.tracking import trust as t; assert se.derive_trust_status is t.derive_trust_status and sy.derive_trust_status is t.derive_trust_status and g.derive_trust_status is t.derive_trust_status; print(1)'"
      expect: "eq:1"
  - id: G-cardinality-4
