# Deliverable manifest: folio-search-v0-9-0
#
# Greenfield deliverable (Shipping Plan §15.6 Slice 6b sub-slice 3 of 3 —
# FINAL sub-slice; this merge closes §15.6 shared-consumer expansion and
# completes Slice 6b). Introduces `folio search` — a new CLI command that
# consumes the shared §5 proposal contract from
# docs/specs/tier4_discovery_proposal_layer_spec.md from the clean-slate side.
# Proves the shared-consumer pattern holds at N=3 surfaces (graph v0.7.1,
# synthesize v0.8.0, search v0.9.0).
#
# Sub-slice lineage:
#   - Sub-slice 1 (folio-graph-generalized-proposals-v0-7-1) shipped at
#     PR #60 / merge 3d413a9 on 2026-04-16 — retrofit pattern on existing
#     command; established _derive_trust_status (private) + shared-contract
#     consumer signature on graph.
#   - Sub-slice 2 (folio-synthesize-v0-8-0) shipped at PR #65 / merge
#     741f0b6 on 2026-04-17 — greenfield pattern on new command; promoted
#     _derive_trust_status to folio.tracking.trust.derive_trust_status
#     (Phase 0, commit 831a741) and designed the shared payload-level
#     `--json` envelope (schema_version 1.0, command, 6 top-level keys).
#   - Sub-slice 3 (this deliverable) — greenfield pattern on a new command
#     with operator-confirmed product shape: required QUERY positional,
#     casefold-substring match, `--producer` as only structured filter,
#     envelope bumped to schema_version "1.1" via addition of `query`
#     top-level key (first minor-version increment of the shared envelope;
#     compliant with synthesize §3.3 versioning policy).
#
# Pre-A INHERITED from tier4_discovery_proposal_layer_spec.md rev 5 §§ 5
# (Proposal Object Contract), 11 (Trust-Gated Surfacing), 12 (Shared
# Consumers — search row), 15.6 (Shared-consumer expansion — search row),
# 15.7 (narrow-don't-reinterpret). Phase A narrows those §§ into the
# implementation spec at docs/specs/v0.9.0_folio_search_spec.md. F-049
# compliance: cite sections by number and name, not paraphrase.
#
# NO Phase 0 prep required this slice. All carry-forwards landed in
# sub-slices 1 and 2:
#   - Shared trust helper: folio.tracking.trust.derive_trust_status exists
#     at commit 831a741 (sub-slice 2 Phase 0); search consumes it verbatim.
#   - Shared envelope contract: synthesize §3.3 established the canonical
#     shape (schema_version, command, scope, trust_override_active,
#     excluded_flagged_count, findings) — search extends it with a 7th
#     top-level `query` key, bumping to "1.1" per the versioning policy.
# G-scope-1 baselines at main@741f0b6 (parent commit; NO Phase 0 floor in
# this slice — Phase A is the first commit).
#
# Codex assigned to adversarial role per v1.2.0 must-differ-provider
# invariant (author family = claude → adversarial family ≠ claude*).
#
# Adopter-only contract in effect: no bundle edits. Bundle at
# frameworks/llm-dev-v1/ remains byte-identical to johnny-os@e40b5c3
# (v1.2.0).

manifest_version: "1.2.0"
id: folio-search-v0-9-0
slug: folio-search
summary: "Greenfield `folio search` command: a read-only QUERY lens over the pending proposal queue that consumes the §5 shared proposal contract, uses the shared `folio.tracking.trust.derive_trust_status` helper (proving the shared-consumer pattern at N=3 surfaces), honors §11 trust-gating with `--include-flagged`, and emits the shared payload-level `--json` envelope at `schema_version: \"1.1\"` (first minor-version bump) with a new `query` top-level key. Substring + casefold matching against 6 text fields (source_id, target_id, relation, producer, reason_summary, evidence_bundle elements); `--producer` as the single structured filter flag in v0.9.0. Regex/ranking/semantic search and multi-lifecycle scope deferred to v0.9.1+. Third of three Shipping Plan §15.6 sub-slices; this merge closes §15.6 and completes Slice 6b."

user_facing: true

# Pre-A inheritance note (v1.2.0 schema strictness):
# pre_a.entry {proposal|triage|validation} declares a NEW pre-A artifact.
# This slice inherits pre-A from the ratified parent spec
# docs/specs/tier4_discovery_proposal_layer_spec.md rev 5 — §§ 5, 11, 12,
# 15.6, 15.7. Phase A narrows those §§ per §15.7. The pre_a block is
# omitted (optional under schema) to avoid misclassifying inherited
# ratification as a new proposal/triage/validation entry point.
# F-049 compliance: §§ named not paraphrased.

owners:
  - "Jonathan Oh (ohjonathan)"

scope:
  allowed_paths:
    # Greenfield module
    - folio/search.py
    # CLI registration (narrow addition — see G-scope-3 line-cap)
    - folio/cli.py
    # Tests
    - tests/test_search.py
    - tests/test_cli_search.py
    - tests/test_trust.py
    # Version + changelog
    - pyproject.toml
    - CHANGELOG.md
    # Spec + manifest
    - docs/specs/v0.9.0_folio_search_spec.md
    - frameworks/manifests/folio-search-v0-9-0.yaml
    # Validation artifacts (per-phase)
    - docs/validation/v0.9.0_spec_peer_claude-sub.md
    - docs/validation/v0.9.0_spec_alignment_gemini.md
    - docs/validation/v0.9.0_spec_adversarial_codex.md
    - docs/validation/v0.9.0_spec_product_claude-sub.md
    - docs/validation/v0.9.0_spec_canonical_verdict.md
    - docs/validation/v0.9.0_code_peer_claude-sub.md
    - docs/validation/v0.9.0_code_alignment_gemini.md
    - docs/validation/v0.9.0_code_adversarial_codex.md
    - docs/validation/v0.9.0_code_product_claude-sub.md
    - docs/validation/v0.9.0_code_canonical_verdict.md
    - docs/validation/v0.9.0_d4_fix_summary.md
    - docs/validation/v0.9.0_d5_verification_gemini.md
    - docs/validation/v0.9.0_d5_verification_codex.md
    - docs/validation/v0.9.0_d5_verification_claude-sub.md
    - docs/validation/v0.9.0_d6_final_approval.md
    # Retro + supplement (Phase E)
    - docs/retros/llm-dev-v1-adoption.md
    - frameworks/manifests/framework-learnings-v1.1-adoption.md
  forbidden_paths:
    # Sibling shared-consumer surfaces (read-only references; zero edits)
    - folio/graph.py
    - folio/synthesize.py
    # Shared helper (landed in sub-slice 2 Phase 0 at 831a741)
    - folio/tracking/trust.py
    # Shared collector + §5 read path
    - folio/links.py
    # Not in scope for greenfield search
    - folio/digest.py
    - folio/enrich.py
    - folio/provenance.py
    - folio/tracking/entities.py
    - folio/tracking/registry.py
    - folio/tracking/sources.py
    - folio/tracking/versions.py
    - folio/pipeline/
    # Parent design specs (read-only references per §15.7)
    - docs/specs/tier4_discovery_proposal_layer_spec.md
    - docs/specs/tier4_digest_design_spec.md
    # Sibling slice specs (read-only references)
    - docs/specs/v0.7.1_folio_graph_generalized_proposals_spec.md
    - docs/specs/v0.8.0_folio_synthesize_spec.md
    # Adopter-only contract
    - frameworks/llm-dev-v1/
    - docs/product/
    - docs/architecture/
    - ontos/
    - .github/
    - Ontos_Context_Map.md
    - AGENTS.md
  forbidden_symbols:
    - "pickle.loads"
    - "eval("
  cardinality_assertions:
    # CB-1 (B.3 canonical verdict — codex ADV-B1-001 closure, v1.1):
    # These commands are POST-IMPLEMENTATION runtime identity checks.
    # Pre-Phase-C (before folio/search.py exists) they correctly FAIL;
    # that failure is expected behavior, not a manifest defect. They
    # RUN at D.6 gate time (mirrored into gate_prerequisites as
    # G-cardinality-1..4 for gate enforcement); their presence here is
    # declarative — documenting the invariants the slice commits to.
    # F-056 mitigation (runtime enforcement) lives in gate_prerequisites.
    # F-058 mitigation: line-caps (G-scope-3) authored conservatively; can
    # expand at D.1 if headroom is needed.
    - name: "search command is registered on the Click CLI (runtime introspection)"
      command: "python3 -c 'from folio.cli import cli; assert \"search\" in cli.commands, sorted(cli.commands.keys()); print(1)'"
      expect: "eq:1"
    - name: "shared envelope schema_version constant exported by folio.search (bumped to 1.1)"
      command: "python3 -c 'from folio.search import SCHEMA_VERSION; assert SCHEMA_VERSION == \"1.1\", SCHEMA_VERSION; print(1)'"
      expect: "eq:1"
    - name: "shared envelope command constant exported by folio.search"
      command: "python3 -c 'from folio.search import COMMAND_NAME; assert COMMAND_NAME == \"search\", COMMAND_NAME; print(1)'"
      expect: "eq:1"
    - name: "shared-consumer invariant (N=3): folio.search uses folio.tracking.trust.derive_trust_status (identity check)"
      command: "python3 -c 'from folio import search as s; from folio.tracking import trust as t; assert s.derive_trust_status is t.derive_trust_status; print(1)'"
      expect: "eq:1"
    - name: "shared-consumer invariant (sub-slice 2 carry-forward): folio.synthesize uses the shared helper"
      command: "python3 -c 'from folio import synthesize as s; from folio.tracking import trust as t; assert s.derive_trust_status is t.derive_trust_status; print(1)'"
      expect: "eq:1"
    - name: "shared-consumer invariant (sub-slice 1 carry-forward): folio.graph uses the shared helper"
      command: "python3 -c 'from folio import graph as g; from folio.tracking import trust as t; assert g.derive_trust_status is t.derive_trust_status; print(1)'"
      expect: "eq:1"
    - name: "no direct LLM imports in folio/search.py (v0.9.0 structural-only MVP; MIN-2 file-existence-guarded)"
      command: "test -f folio/search.py && ! grep -E 'from folio.llm|import folio.llm|from openai|import openai|from anthropic|import anthropic' folio/search.py"
      expect: "exit-0"

artifacts:
  spec:              "docs/specs/v0.9.0_folio_search_spec.md"
  family_verdict:    "docs/validation/v0.9.0_<phase>_<role>_<family>.md"
  canonical_verdict: "docs/validation/v0.9.0_<phase>_canonical_verdict.md"
  product_verdict:   "docs/validation/v0.9.0_<phase>_product_<family>.md"
  fix_summary:       "docs/validation/v0.9.0_d4_fix_summary.md"
