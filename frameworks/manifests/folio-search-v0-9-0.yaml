    description: "Shared-consumer invariant unit test passes (class-level test in tests/test_trust.py)."
    verification:
      command: "python3 -m pytest tests/test_trust.py::TestSharedConsumerInvariant -q"
      expect: "exit-0"
  - id: G-test-3
    category: test
    description: "Envelope shape invariants (E1-E8 per spec §3.3) pass — producer-side exact key assertion includes the new `query` top-level key; schema_version==\"1.1\" verified end-to-end."
    verification:
      command: "python3 -m pytest tests/test_cli_search.py -k 'envelope or query_roundtrip' -q"
      expect: "exit-0"
  - id: G-test-4
    category: test
