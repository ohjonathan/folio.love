# Model assignments — mirror folio-search-v0-9-0 structure.
# v1.2.0 invariant: adversarial family must NOT share provider with author
# (claude ≠ codex — OK). Dispatch-outage fallback per F-054/F-055/F-059:
# if gemini or codex is unreachable at 1h retry horizon, halt ≤24h;
# >24h escalate to 3-lens + supplementary round. codex-as-gemini swap and
# codex-as-alignment swap are pre-authorized precedents.
model_assignments:
  - phase: "A"
    assignments:
      claude: spec-author
  - phase: "B.1"
    assignments:
      codex:      adversarial
      gemini:     alignment
      claude-sub: peer
  - phase: "B.1"
    assignments:
      claude-sub: product
  - phase: "B.2"
    assignments:
      codex:      adversarial
      gemini:     alignment
      claude-sub: peer
  - phase: "B.2"
    assignments:
      claude-sub: product
  - phase: "B.3"
    assignments:
      codex: meta-consolidator
  - phase: "C"
    assignments:
      claude: implementation-author
  - phase: "D.2"
    assignments:
      codex:      adversarial
      gemini:     alignment
      claude-sub: peer
  - phase: "D.2"
    assignments:
      claude-sub: product
  - phase: "D.3"
    assignments:
      codex: meta-consolidator
  - phase: "D.4"
    assignments:
      claude: fix-author
  # v1.2.0 review-phase invariant: D.5 requires ≥3 non-author engineering
  # families (verify-p3). Mirrors v0.7.1 / v0.8.0 / v0.9.0 treatment.
  - phase: "D.5"
    assignments:
      gemini:     verifier
      codex:      verifier
      claude-sub: verifier
  - phase: "D.6"
    assignments:
      codex: final-approval
  - phase: "E"
    assignments:
      claude: retro

