# Deliverable manifest: folio-enrich-diagnose-v1-0-0
#
# First slice of Tier-4 Roadmap row #4 ("Graph quality layer") — sub-item
# A only. Introduces `folio enrich diagnose` per parent enrich spec §7.7
# rev 5 (a read-only diagnostic surface for managed-section hygiene
# blockers). Sub-items B (trust-aware graph behavior across Tier-4
# discovery surfaces) and C (relation-schema validation) are EXPLICIT
# non-goals reserved for follow-on slices in the same roadmap row.
#
# Version v1.0.0 — first major-version-threshold crossing in the
# folio.love adopter chain. Marks the parent §7.7 contract as shipped.
#
# Pre-A INHERITED from parent specs:
#   - docs/specs/folio_enrich_spec.md §7.7 ("`folio enrich diagnose`"
#     contract): command shape, eligibility predicate, minimum finding
#     classes (3), fixed-schema 5-key inner finding shape, read-only
#     guarantee, exit semantics.
#   - docs/product/04_Implementation_Roadmap.md §"Week 26-27" line
#     569-570 (`folio enrich diagnose [scope] [--json] [--limit N]`
#     identifies notes whose managed sections cannot be safely updated).
# Phase A (this slice) narrows §7.7 into the implementation spec at
# docs/specs/v1.0.0_folio_enrich_diagnose_spec.md. F-049 compliance:
# §§ cited by number and name, not paraphrased.
#
# NO Phase 0 prep required this slice. Diagnose is a thin filter +
# renderer over the existing `plan_enrichment` predicate (already shipped
# at folio/enrich.py:233-342). All consumed surfaces are at their main
# state at branch-point 2f0369b.
#
# Operator-confirmed product shape (Phase-A AskUserQuestion 2026-04-17):
#   1. Trust posture: ANNOTATION-ONLY. Per-finding `trust_status` key
#      (read directly from frontmatter); NO default exclusion of flagged
#      notes; NO `--include-flagged` flag; NO direct call to the slice-4
#      shared helper `folio.tracking.trust.derive_trust_status`. This is
#      the firewall against sub-item B (which owns blanket flagged-input
#      exclusion across Tier-4 discovery surfaces). G-scope-5 enforces.
#   2. Envelope shape: FRESH note-level envelope at schema_version "1.0".
#      NOT the v0.9.0 shared-consumer envelope (which is for relationship-
#      proposal consumers — graph / synthesize / search). Diagnose
#      operates on notes, not proposals. Spec §7.4 disclaims reuse.
#
# Codex assigned to adversarial role per v1.2.0 must-differ-provider
# invariant (author family = claude → adversarial family ≠ claude*).
# Dispatch-outage fallback per F-054/F-055/F-059: if gemini or codex is
# unreachable at 1h retry horizon, halt ≤24h; >24h escalate to 3-lens +
# supplementary round.
#
# Adopter-only contract in effect: no bundle edits. Bundle at
# frameworks/llm-dev-v1/ remains byte-identical to johnny-os@e40b5c3
# (v1.2.0).

manifest_version: "1.2.0"
id: folio-enrich-diagnose-v1-0-0
slug: folio-enrich-diagnose
summary: "Read-only `folio enrich diagnose [scope] [--json] [--limit N]` surface — first slice of Tier-4 Roadmap row #4 (Graph quality layer), sub-item A only. Identifies evidence and interaction notes whose managed sections cannot be safely updated by `folio enrich`, surfacing the (disposition, reason) tuples computed by the existing `_determine_disposition` predicate as stable finding codes per parent enrich spec §7.7. Six finding codes (frontmatter_unreadable, managed_sections_unidentified, protected_by_curation_level, protected_by_review_status, managed_body_conflict, enrich_status_stale) with deterministic severity (error/warning/info), sorted three-level (severity_rank desc, code asc, subject_id asc) per CSF-1 closure, trust-annotated per finding (annotation-only — no default exclusion of flagged notes, no --include-flagged flag; `[flagged]` marker INSIDE severity bracket per CSF-2 graph-doctor parity). Fresh JSON envelope at schema_version 1.0 with seven top-level keys. Reshapes `folio/cli.py` `enrich` command into a click group with `invoke_without_command=True` (preserves existing `folio enrich [scope]` invocation, including option-before-scope forms via v1.2 ScopeOrCommandGroup extension per CB-2 final closure). Invalid scope and corrupt registry are fatal exit-1 per parent §7.7 (CB-3 closure via `_resolve_scope_or_raise` preflight + `ScopeResolutionError`). Strict firewall against sub-item B (no `derive_trust_status`, no `--include-flagged`); enforced by G-scope-5 (folio/enrich.py whole-file) + G-scope-6 (marker-bounded folio/cli.py diagnose block) + G-scope-7 (runtime --help check)."

user_facing: true

# Pre-A inheritance note (v1.2.0 schema strictness):
# pre_a.entry {proposal|triage|validation} declares a NEW pre-A artifact.
# This slice inherits pre-A from two upstream sources:
#   (a) docs/specs/folio_enrich_spec.md §7.7 — the ratified parent
#       contract for `folio enrich diagnose` (rev 5).
#   (b) docs/product/04_Implementation_Roadmap.md §"Week 26-27" — the
#       roadmap commitment that scopes sub-item A vs B vs C.
# Phase A narrows both into the implementation spec. The pre_a block is
# omitted (optional under schema) to avoid misclassifying inherited
# ratification as a new proposal/triage/validation entry point.
# F-049 compliance: §§ named not paraphrased.

owners:
  - "Jonathan Oh (ohjonathan)"

scope:
  allowed_paths:
    # Module additions (additive — existing plan_enrichment / enrich_batch / _determine_disposition unchanged)
    - folio/enrich.py
    # CLI group reshape + new subcommand
    - folio/cli.py
    # New tests
    - tests/test_enrich_diagnose.py
    - tests/test_cli_enrich_diagnose.py
    # ONE regression test added to existing enrich tests (group-reshape regression)
    - tests/test_enrich.py
    # Version + changelog
    - pyproject.toml
    - CHANGELOG.md
    # Spec + manifest
    - docs/specs/v1.0.0_folio_enrich_diagnose_spec.md
    - frameworks/manifests/folio-enrich-diagnose-v1-0-0.yaml
    # Ontos auto-regen (F-048)
    - Ontos_Context_Map.md
    # AGENTS.md auto-regen (D.6 R2 closure): codex's `ontos map` invocation
    # during the D.6 gate audit regenerated AGENTS.md's auto-managed sections
    # (timestamp, doc count, branch reference). The regen is allowed per
    # AGENTS.md's own contract ("regenerate with `ontos map`"). Adding to
    # allowed_paths so the gate doesn't fire on auto-regen artifacts.
    - AGENTS.md
    # Validation artifacts (per-phase)
    - docs/validation/v1.0.0_spec_peer_claude-sub.md
    - docs/validation/v1.0.0_spec_alignment_gemini.md
    - docs/validation/v1.0.0_spec_adversarial_codex.md
    - docs/validation/v1.0.0_spec_product_claude-sub.md
    - docs/validation/v1.0.0_spec_canonical_verdict.md
    - docs/validation/v1.0.0_code_peer_claude-sub.md
    - docs/validation/v1.0.0_code_alignment_gemini.md
    - docs/validation/v1.0.0_code_adversarial_codex.md
    - docs/validation/v1.0.0_code_product_claude-sub.md
    - docs/validation/v1.0.0_code_canonical_verdict.md
    - docs/validation/v1.0.0_d4_fix_summary.md
    - docs/validation/v1.0.0_d5_verification_gemini.md
    - docs/validation/v1.0.0_d5_verification_codex.md
    - docs/validation/v1.0.0_d5_verification_claude-sub.md
    - docs/validation/v1.0.0_d6_final_approval.md
    # Retro + supplement (Phase E)
    - docs/retros/llm-dev-v1-adoption.md
    - frameworks/manifests/framework-learnings-v1.1-adoption.md
  forbidden_paths:
    # Sub-item B firewall — DIAGNOSE MUST NOT CONSUME the slice-4 trust
    # helper. The helper takes a RelationshipProposalView, not a note;
    # crossing this path implies pre-merging A and B scopes.
    - folio/tracking/trust.py
    # Sibling shared-consumer surfaces — read-only references; zero edits
    - folio/graph.py
    - folio/synthesize.py
    - folio/search.py
    - folio/links.py
    # Out of scope for diagnose
    - folio/digest.py
    - folio/provenance.py
    - folio/tracking/entities.py
    - folio/tracking/registry.py
    - folio/tracking/sources.py
    - folio/tracking/versions.py
    - folio/pipeline/
    # Parent + sibling specs (read-only references per §15.7 narrow-don't-reinterpret)
    - docs/specs/folio_enrich_spec.md
    - docs/specs/tier4_discovery_proposal_layer_spec.md
    - docs/specs/tier4_digest_design_spec.md
    - docs/specs/v0.6.4_trust_gated_surfacing_spec.md
    - docs/specs/v0.7.0_folio_digest_spec.md
    - docs/specs/v0.7.1_folio_graph_generalized_proposals_spec.md
    - docs/specs/v0.8.0_folio_synthesize_spec.md
    - docs/specs/v0.9.0_folio_search_spec.md
    # Adopter-only contract
    - frameworks/llm-dev-v1/
    - docs/product/
    - docs/architecture/
    - ontos/
    - .github/
  forbidden_symbols:
    - "pickle.loads"
    - "eval("
    - "exec("
  cardinality_assertions:
    # These commands are POST-IMPLEMENTATION runtime identity checks.
    # Pre-Phase-C (before folio/enrich.py changes ship) several will
    # correctly FAIL — that failure is expected behavior, not a manifest
    # defect. Gate-time enforcement lives in gate_prerequisites
    # (G-cardinality-1..6). Their presence here is declarative —
    # documenting the invariants the slice commits to.
    # F-056 mitigation (runtime enforcement) lives in gate_prerequisites.
    # F-058 mitigation: line-caps (G-scope-3) authored conservatively.
    - name: "enrich is a click group (post-reshape) with `diagnose` subcommand registered"
      command: "python3 -c 'from folio.cli import cli; assert \"enrich\" in cli.commands and hasattr(cli.commands[\"enrich\"], \"commands\") and \"diagnose\" in cli.commands[\"enrich\"].commands; print(1)'"
      expect: "eq:1"
    - name: "DIAGNOSE_SCHEMA_VERSION constant exported by folio.enrich"
      command: "python3 -c 'from folio.enrich import DIAGNOSE_SCHEMA_VERSION; assert DIAGNOSE_SCHEMA_VERSION == \"1.0\", DIAGNOSE_SCHEMA_VERSION; print(1)'"
      expect: "eq:1"
    - name: "DIAGNOSE_COMMAND_NAME constant exported by folio.enrich"
      command: "python3 -c 'from folio.enrich import DIAGNOSE_COMMAND_NAME; assert DIAGNOSE_COMMAND_NAME == \"enrich diagnose\", DIAGNOSE_COMMAND_NAME; print(1)'"
      expect: "eq:1"
    - name: "diagnose_notes function importable from folio.enrich"
      command: "python3 -c 'from folio.enrich import diagnose_notes; assert callable(diagnose_notes); print(1)'"
      expect: "eq:1"
    - name: "Sub-item B firewall (a): zero references to derive_trust_status or include-flagged in folio/enrich.py (the diagnose code path)"
      command: "! grep -nE 'derive_trust_status|include[-_]flagged' folio/enrich.py"
      expect: "exit-0"
    - name: "Sub-item B firewall (b) — CB-4 closure: zero references to include-flagged or derive_trust_status inside the marker-bounded v1.0.0 diagnose CLI block in folio/cli.py (existing --include-flagged on digest/search/graph doctor/synthesize lives OUTSIDE the marker block)"
      command: "! awk '/^# v1\\.0\\.0 diagnose CLI: BEGIN/,/^# v1\\.0\\.0 diagnose CLI: END/' folio/cli.py | grep -nE 'include[-_]flagged|derive_trust_status'"
      expect: "exit-0"
    - name: "Diagnose --help does not expose --include-flagged (runtime CB-4 enforcement via ED-CLI-19)"
      command: "python3 -m folio enrich diagnose --help | ! grep -F -- '--include-flagged'"
      expect: "exit-0"
    - name: "ScopeResolutionError exported by folio.enrich (CB-3 closure)"
      command: "python3 -c 'from folio.enrich import ScopeResolutionError; assert issubclass(ScopeResolutionError, Exception); print(1)'"
      expect: "eq:1"
    - name: "No new direct LLM imports in folio/enrich.py (existing imports allowed; this assertion checks that no new openai/anthropic-style import was added in this slice)"
      command: "! grep -nE 'from openai|import openai|from anthropic|import anthropic' folio/enrich.py"
      expect: "exit-0"

