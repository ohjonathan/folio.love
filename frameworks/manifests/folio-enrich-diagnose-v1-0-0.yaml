  - phase: "C"
    checks:
      - name: "folio imports"
        command: "python3 -c 'import folio'"
        expect: "exit-0"
      - name: "folio.enrich imports"
        command: "python3 -c 'import folio.enrich'"
        expect: "exit-0"
      - name: "diagnose + scope-relevant test suites"
        command: "python3 -m pytest tests/test_enrich_diagnose.py tests/test_cli_enrich_diagnose.py tests/test_enrich.py tests/test_enrich_integration.py tests/test_enrich_data.py -q"
        expect: "exit-0"
      - name: "lint regression check (no NEW ruff errors introduced by this slice)"
        command: "ruff check folio/enrich.py folio/cli.py 2>&1 | grep -c '^Found' && ruff check folio/enrich.py folio/cli.py --output-format concise 2>&1 | grep -E '^folio/(enrich|cli)\\.py' | wc -l | awk '{ if ($1 > 13) { print \"FAIL new errors:\" $1 \" baseline:13\"; exit 1 } else print \"ok errors=\" $1 }'"
        expect: "regex:^ok"
      - name: "folio enrich diagnose --help works (smoke)"
        command: "python3 -m folio enrich diagnose --help"
        expect: "exit-0"
      - name: "folio enrich --help still works post group reshape (smoke regression)"
        command: "python3 -m folio enrich --help"
        expect: "exit-0"
  - phase: "D.6"
    checks:
      - name: "branch ahead of main"
        command: "git rev-list --count main..HEAD"
        expect: "gte:1"

