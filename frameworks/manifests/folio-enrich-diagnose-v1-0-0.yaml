branch_map:
  default: "feat/folio-enrich-diagnose-v1-0-0-<PHASE_ID>-<ROLE>-<FAMILY>"

references:
  - path: "docs/specs/folio_enrich_spec.md"
    version: "rev 5"
    relevance: "Pre-A anchor. §7.7 (`folio enrich diagnose`) defines the contract this slice narrows: command shape, eligibility predicate, three minimum finding classes (managed_sections_unidentified, protected_by_curation_level, protected_by_review_status), 5-key inner finding schema, read-only guarantee, exit semantics. §9 (`_llm_metadata.enrich`) defines the `status: stale` enum value that this slice surfaces as `enrich_status_stale`. Forbidden path; read-only reference per §15.7 narrow-don't-reinterpret."
  - path: "docs/product/04_Implementation_Roadmap.md"
    version: "current"
    relevance: "Pre-A anchor. §\"Week 26-27: Graph Quality Layer\" lines 569-578 split the row #4 work into sub-items A (this slice — folio enrich diagnose), B (trust-aware graph behavior across Tier-4 surfaces; deferred), C (relation-schema validation; deferred). §\"Implementation Order\" line 545 lists row #4 status as Pending. Forbidden path; read-only reference."
  - path: "folio/enrich.py"
    version: "post v0.9.0 (no edits since slice 6b.3 merge)"
    relevance: "PRIMARY IMPLEMENTATION TARGET. `_determine_disposition` at lines 345-415 is the disposition oracle whose output diagnose surfaces. `plan_enrichment` at lines 233-342 is the entry point diagnose calls (with force=False, dry_run=True). `EnrichPlanEntry` dataclass at lines 204-214 is the per-note shape diagnose iterates. Diagnose adds DIAGNOSE_SCHEMA_VERSION, DIAGNOSE_COMMAND_NAME, DiagnoseFinding, DiagnoseSummary, DiagnoseResult, diagnose_notes, _entry_to_finding, _finding_sort_key — all additive. Existing functions are NOT modified."
  - path: "folio/cli.py"
    version: "post v0.9.0"
    relevance: "GROUP RESHAPE TARGET. Existing `enrich` at line 1128 is a flat @cli.command(); this slice converts to @cli.group(cls=ScopeOrCommandGroup, invoke_without_command=True) following the proven pattern at folio/cli.py:1179-1234 (`folio digest`). Adds @enrich.command(\"diagnose\") subcommand following the @graph.command(\"doctor\") pattern at folio/cli.py:2090-2189 for --json envelope output. `_render_diagnose_text` and `_render_diagnose_json` helpers added near the diagnose subcommand."
  - path: "folio/tracking/trust.py"
    version: "post sub-slice 2 Phase 0 (commit 831a741)"
    relevance: "FORBIDDEN PATH. The slice-4 shared helper `derive_trust_status(view) -> str` operates on a RelationshipProposalView (which has a `.flagged_inputs` set marking which proposal endpoint is flagged). Notes have no such attribute. Diagnose reads `entry.existing_fm.get(\"review_status\") == \"flagged\"` directly — no helper call. G-scope-5 grep firewall enforces zero references in folio/enrich.py."
  - path: "docs/specs/v0.9.0_folio_search_spec.md"
    version: "shipped v0.9.0 (PR #67)"
    relevance: "Most recent v1.2.0 spec template. §3 module structure shape, §7 envelope discipline, §8 (Test Plan organization) all serve as templates. Diagnose envelope is INTENTIONALLY NOT the v0.9.0 shared envelope — diagnose operates on notes, not proposals (spec §7.4 disclaims reuse)."
  - path: "docs/specs/v0.7.0_folio_digest_spec.md"
    version: "shipped v0.7.0 (PR #58)"
    relevance: "Greenfield CLI subcommand precedent. Group reshape pattern at folio/cli.py:1179-1234 originated here. Typed dataclass result (DigestResult) precedent for DiagnoseResult."
  - path: "docs/specs/v0.6.4_trust_gated_surfacing_spec.md"
    version: "shipped v0.6.4"
    relevance: "Slice-4 trust-gated surfacing. Discovery-surface pattern (default-exclude + --include-flagged + disclosure + no-silent-empty + posture annotation). EXPLICITLY NOT INHERITED here — diagnose is a diagnostic surface, not a discovery surface; only the posture-annotation rule (rule 5) applies. Spec §6 documents the firewall reasoning."
  - path: "docs/specs/v0.8.0_folio_synthesize_spec.md"
    version: "shipped v0.8.0 (PR #65)"
    relevance: "Established the shared payload-level `--json` envelope versioning policy (§3.3): \"Producers MUST bump minor when adding a top-level key.\" Diagnose adopts the same versioning policy for its own envelope (fresh schema_version 1.0; future minor bumps follow this rule). SF-108 closure (named-tuple regression — DiagnoseFinding uses named dataclass fields, not positional tuples) carries forward into ED-14 test."
  - path: "frameworks/manifests/folio-search-v0-9-0.yaml"
    version: "shipped v0.9.0"
    relevance: "Manifest template. model_assignments, cli_capability_matrix, smoke_checks, regression_guards, gate_prerequisites shape all mirror this manifest. Differences: this slice has no shared-consumer invariant (diagnose envelope is fresh); G-scope-5 firewall against derive_trust_status is unique to this slice; G-scope-3 line caps are higher (140/180 vs 100/n/a) because group reshape requires more headroom."
