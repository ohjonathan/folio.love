    verification:
      command: "python3 -m pytest tests/test_enrich_diagnose.py tests/test_cli_enrich_diagnose.py -q"
      expect: "exit-0"
  - id: G-scope-1
    category: scope
    description: "No changes to forbidden paths (baseline: main@2f0369b — branch-point of feat/folio-enrich-diagnose-v1-0-0-C-author-claude)."
    verification:
      command: "git diff --name-only 2f0369b..HEAD | grep -E '^(folio/tracking/trust\\.py|folio/graph\\.py|folio/synthesize\\.py|folio/search\\.py|folio/links\\.py|folio/digest\\.py|folio/provenance\\.py|folio/tracking/entities\\.py|folio/tracking/registry\\.py|folio/tracking/sources\\.py|folio/tracking/versions\\.py|folio/pipeline/|docs/specs/folio_enrich_spec\\.md|docs/specs/tier4_|docs/specs/v0\\.6\\.4_|docs/specs/v0\\.7\\.0_|docs/specs/v0\\.7\\.1_|docs/specs/v0\\.8\\.0_|docs/specs/v0\\.9\\.0_|docs/product/|docs/architecture/|frameworks/llm-dev-v1/)'"
      expect: "exit-nonzero"
  - id: G-scope-2
    category: scope
    description: "Forbidden symbols absent from scope-lock paths."
    verification:
      command: "grep -rE 'pickle\\.loads|eval\\(|exec\\(' folio/enrich.py folio/cli.py | grep -vE '^\\s*#|^\\s*\"\"\"|^\\s*\\*'"
      expect: "exit-nonzero"
  - id: G-scope-3
    category: scope
    description: "folio/cli.py changes bounded to enrich group reshape + diagnose subcommand registration + PROD-SF-006 breadcrumb + v1.2/v1.3 ScopeOrCommandGroup extension + D.4 R2 shlex.quote breadcrumb fix (240-line cap on added; baseline 2f0369b; raised at D.6 from D.4 estimate of 220 to accommodate D.4 R2 shlex.quote import + branch-on-scope breadcrumb refactor — measured 229 added at D.6 HEAD). folio/enrich.py changes bounded to additive diagnose surface + D.4 _check_registry_or_raise + D.4 R2 shlex.quote action text (340-line cap on added; raised from D.4 estimate of 290 at D.6 to accommodate D.4 _check_registry_or_raise helper + library_root preflight + DSF-002 shlex.quote in _entry_to_finding + DCB-1 unfiltered_total field + DCSF-005 generic-tuple annotation update — measured 333 added at D.6 HEAD). F-058 cap-headroom mitigation invoked at D.6 per the manifest's progressive-cap-raise policy. ADV-MIN-003 closure: gate also fails if either file shows delete/rename status."
    verification:
      command: "git diff --name-status 2f0369b..HEAD -- folio/cli.py folio/enrich.py | grep -E '^[DR]' && exit 1 || git diff --numstat 2f0369b..HEAD -- folio/cli.py folio/enrich.py | awk 'BEGIN{cli_a=0;enrich_a=0} {if($3==\"folio/cli.py\") cli_a=$1; else if($3==\"folio/enrich.py\") enrich_a=$1} END {if (cli_a > 240 || enrich_a > 340) {print \"FAIL cli=\"cli_a\" enrich=\"enrich_a; exit 1} else print \"ok cli=\"cli_a\" enrich=\"enrich_a}'"
      expect: "regex:^ok"
  - id: G-scope-4
    category: scope
    description: "No new direct LLM imports in folio/enrich.py (existing transitive imports via folio.config / folio.llm allowed; new openai/anthropic-style imports forbidden)."
    verification:
      command: "! grep -nE 'from openai|import openai|from anthropic|import anthropic' folio/enrich.py"
      expect: "exit-0"
  - id: G-scope-5
    category: scope
    description: "Sub-item B firewall (a): zero references to derive_trust_status or include-flagged in folio/enrich.py. Diagnose annotation reads frontmatter directly; the slice-4 helper applies to RelationshipProposalView (not notes), and the --include-flagged flag is operator-confirmed out of scope. Crossing this path implies pre-merging A and B."
    verification:
      command: "! grep -nE 'derive_trust_status|include[-_]flagged' folio/enrich.py"
      expect: "exit-0"
  - id: G-scope-6
    category: scope
    description: "Sub-item B firewall (b) — CB-4 closure: zero references to include-flagged or derive_trust_status inside the marker-bounded v1.0.0 diagnose CLI block in folio/cli.py. Existing --include-flagged on digest/search/graph doctor/synthesize lives OUTSIDE the markers and is allowed. The marker bounds the scope of the firewall to ONLY the new diagnose code path."
    verification:
      command: "! awk '/^# v1\\.0\\.0 diagnose CLI: BEGIN/,/^# v1\\.0\\.0 diagnose CLI: END/' folio/cli.py | grep -nE 'include[-_]flagged|derive_trust_status'"
      expect: "exit-0"
  - id: G-scope-7
    category: scope
    description: "Sub-item B firewall (c) — CB-4 closure: runtime --help check. `folio enrich diagnose --help` output does not contain the literal '--include-flagged'. ED-CLI-19 mirror. D.5 codex closure: shell negation moved to command head (was `cmd | ! grep` which is invalid POSIX — `!` only negates at the start of a pipeline)."
    verification:
      command: "! python3 -m folio enrich diagnose --help | grep -F -- '--include-flagged'"
      expect: "exit-0"
  - id: G-cardinality-1
    category: cardinality
    description: "enrich is a click group (post-reshape) and diagnose is a registered subcommand."
    verification:
      command: "python3 -c 'from folio.cli import cli; assert \"enrich\" in cli.commands and hasattr(cli.commands[\"enrich\"], \"commands\") and \"diagnose\" in cli.commands[\"enrich\"].commands; print(1)'"
      expect: "eq:1"
