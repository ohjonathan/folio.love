    verification:
      command: "python3 -m pytest tests/test_enrich_diagnose.py tests/test_cli_enrich_diagnose.py tests/test_enrich.py tests/test_enrich_integration.py tests/test_enrich_data.py tests/test_search.py tests/test_cli_search.py tests/test_synthesize.py tests/test_cli_synthesize.py tests/test_graph.py tests/test_graph_cli.py tests/test_trust.py tests/test_digest.py tests/test_cli_digest.py tests/test_entities.py tests/test_cli_entities.py tests/test_links_cli.py -q"
