# Deliverable manifest: trust-gated-surfacing-v0-6-4
#
# Fourth production llm-dev-v1.1 run (fifth lifecycle total, counting PROV-1).
# Slice 4 of the Tier 4 Proposal Layer Shipping Plan
# (tier4_discovery_proposal_layer_spec.md §15.4).
#
# Feature: trust-gated surfacing for `folio links review`.
#   - Proposals whose source or target document has review_status: flagged
#     are excluded by default (§11 rule 1).
#   - `--include-flagged` override with trust-posture annotation (§11 rules 2-3).
#   - Excluded-count disclosure + silent-empty protection (§11 rules 4-5).
#   - extraction_confidence remains informational only (§11 rule 6).
#
# folio digest is deferred (command does not exist yet; separate feature).
#
# Pre-A is INHERITED from the parent proposal doc (§15.4 pre-ratified).
# Adversarial lens: codex (user directive, validated across 3 prior slices).

manifest_version: "1.1.0"
id: trust-gated-surfacing-v0-6-4
slug: trust-gated-surfacing
summary: "Trust-gated surfacing for folio links review (§11 + §15.4). Excludes proposals involving flagged-input documents by default; --include-flagged override with trust-posture tags."

user_facing: true

pre_a:
