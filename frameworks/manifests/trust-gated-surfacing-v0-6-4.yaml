smoke_checks:
  - phase: "C"
    checks:
      - name: "folio imports"
        command: "python3 -c 'import folio'"
        expect: "exit-0"
      - name: "full test suite"
        command: "python3 -m pytest tests/ -q"
        expect: "exit-0"
      - name: "lint clean on scope-lock paths"
        command: "ruff check folio/links.py folio/cli.py"
        expect: "exit-0"
  - phase: "D.6"
    checks:
      - name: "branch ahead of main by at least 1"
        command: "git rev-list --count main..HEAD"
        expect: "gte:1"

regression_guards:
  - name: "Tier 3 entity system tests"
    command: "python3 -m pytest tests/test_cli_entities.py -q"
    owns_deliverable_id: "tier3-entity-system-v0.5.1"
  - name: "Tier 4 graph ops layer tests"
    command: "python3 -m pytest tests/test_enrich_data.py tests/test_provenance_cli.py -q"
    owns_deliverable_id: "tier4-graph-ops-v0.5.2"
  - name: "Slice 1 links + graph tests"
    command: "python3 -m pytest tests/test_links_cli.py tests/test_graph_cli.py -q"
    owns_deliverable_id: "proposal-review-hardening-v0-6-0"
  - name: "Slice 2 lifecycle rename tests"
    command: "python3 -m pytest tests/test_enrich_data.py tests/test_enrich.py -q"
    owns_deliverable_id: "proposal-lifecycle-rename-v0-6-1"
  - name: "Slice 3 emission-time rejection tests"
    command: "python3 -m pytest tests/test_enrich.py tests/test_enrich_data.py -q"
    owns_deliverable_id: "emission-time-rejection-v0-6-3"

gate_prerequisites:
  - id: G-test-1
    category: test
    description: "Full folio test suite passes."
    verification:
      command: "python3 -m pytest tests/ -q"
      expect: "exit-0"
  - id: G-test-2
    category: test
    description: "Scope-specific test files pass."
    verification:
      command: "python3 -m pytest tests/test_links_cli.py -q"
      expect: "exit-0"
  - id: G-scope-1
    category: scope
    description: "No changes to forbidden paths."
    verification:
      command: "git diff --name-only main..HEAD | grep -E '^(folio/enrich\\.py|folio/graph\\.py|folio/provenance\\.py|folio/tracking/|folio/analysis_docs\\.py|folio/entity_stubs\\.py|folio/pipeline/enrich_data\\.py|docs/product/|docs/architecture/|frameworks/llm-dev-v1/|AGENTS\\.md|Ontos_Context_Map\\.md)'"
      expect: "exit-nonzero"
  - id: G-scope-2
    category: scope
    description: "Forbidden symbols absent from scope-lock paths."
    verification:
      command: "grep -rE 'pickle\\.loads|eval\\(' folio/links.py folio/cli.py"
      expect: "exit-nonzero"
  - id: G-verdict-1
    category: verdict-presence
    description: "B.3 canonical spec verdict exists."
    verification:
      command: "test -f docs/validation/v0.6.4_spec_canonical_verdict.md"
      expect: "exit-0"
  - id: G-verdict-2
    category: verdict-presence
    description: "D.3 canonical code verdict exists (if D phase executed)."
    verification:
      command: "test -f docs/validation/v0.6.4_code_canonical_verdict.md"
      expect: "exit-0"
  - id: G-verdict-3
    category: verdict-presence
    description: "Product verdicts from B.1 / D.2 exist."
    verification:
      command: "ls docs/validation/v0.6.4_{spec,code}_product_claude-sub.md 2>/dev/null | wc -l | tr -d ' '"
      expect: "gte:2"
  - id: G-blocker-1
    category: blocker-closure
    description: "D.5 verification confirms every D.3 blocker has a fix-table row."
    verification:
      command: "test -f docs/validation/v0.6.4_d5_verification.md"
      expect: "exit-0"
  - id: G-branch-1
    category: branch
    description: "Working tree clean."
    verification:
      command: "git status --porcelain | grep -v '^??'"
      expect: "empty"
  - id: G-branch-2
    category: branch
    description: "Feature branch ahead of main."
    verification:
      command: "git rev-list --count main..HEAD"
      expect: "gte:1"

branch_map:
  default: "feat/trust-gated-surfacing-v0-6-4-<PHASE_ID>-<ROLE>-<FAMILY>"

