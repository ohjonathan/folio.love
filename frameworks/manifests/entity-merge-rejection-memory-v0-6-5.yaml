    version: "2026-04-15 rev 5"
    relevance: "§15.6 slice scope; §7 entity-merge basis_fingerprint convention."
  - path: "docs/specs/v0.6.0_proposal_review_hardening_spec.md"
    version: "v1.3"
    relevance: "Slice 1 — pattern source for rejection-memory + suppression-count + revival-annotation."
