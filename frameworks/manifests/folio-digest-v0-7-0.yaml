# Deliverable manifest: folio-digest-v0-7-0
#
# New-surface deliverable (prereq for Shipping Plan §15.6 slice 6b shared-consumer
# expansion). First implementation of `folio digest` per
# docs/specs/tier4_digest_design_spec.md (first-slice scope: daily + weekly,
# engagement-scoped, no --steerco, no cross-engagement, no mtime inference).
#
# Pre-A INHERITED from tier4_digest_design_spec (rev 4 on main). Phase A
# authors the implementation spec (v0.7.0) narrowing the design spec into
# concrete module/function/test contracts.
#
# Codex assigned to adversarial role per v1.1.1/v1.2 A-1 policy.
#
# Adopter-only contract in effect: no bundle edits. Bundle at
# frameworks/llm-dev-v1/ remains byte-identical to johnny-os@4dfa01f.

manifest_version: "1.1.0"
id: folio-digest-v0-7-0
slug: folio-digest
summary: "First implementation of `folio digest` command — daily + weekly digest generation per tier4_digest_design_spec §4-11. Engagement-scoped. Greenfield module folio/digest.py + folio/cli.py digest group. Unblocks Shipping Plan §15.6 slice 6b shared-consumer expansion by landing the first external consumer of the Tier 4 graph-ops + trust-gated surfacing contracts."

user_facing: true

pre_a:
  entry: inherited
  artifact_path: docs/specs/tier4_digest_design_spec.md
  justification: "Tier 4 design spec rev 4 is the ratified Pre-A input. Phase A narrows it into an implementation spec per §15.7 contract (slice manifests narrow, don't reinterpret)."

owners:
  - "Jonathan Oh (ohjonathan)"

scope:
  allowed_paths:
    # Greenfield module
    - folio/digest.py
    # Command-group addition (narrowly-scoped — only the new `digest` group)
    - folio/cli.py
    # Greenfield test files
    - tests/test_digest.py
    - tests/test_cli_digest.py
    # Documentation
    - CHANGELOG.md
    - docs/specs/v0.7.0_folio_digest_spec.md
    - docs/validation/v0.7.0_spec_peer_claude-sub.md
    - docs/validation/v0.7.0_spec_peer_claude-sub_round2.md
    - docs/validation/v0.7.0_spec_alignment_gemini.md
    - docs/validation/v0.7.0_spec_adversarial_codex.md
    - docs/validation/v0.7.0_spec_adversarial_codex_round2.md
    - docs/validation/v0.7.0_spec_product_claude-sub.md
    - docs/validation/v0.7.0_spec_product_claude-sub_round2.md
    - docs/validation/v0.7.0_spec_canonical_verdict.md
    - docs/validation/v0.7.0_spec_canonical_verdict_round2.md
    - docs/validation/v0.7.0_code_peer_claude-sub.md
    - docs/validation/v0.7.0_code_alignment_gemini.md
    - docs/validation/v0.7.0_code_adversarial_codex.md
    - docs/validation/v0.7.0_code_product_claude-sub.md
    - docs/validation/v0.7.0_code_canonical_verdict.md
    - docs/validation/v0.7.0_d4_fix_summary.md
    - docs/validation/v0.7.0_d5_verification.md
    - docs/validation/v0.7.0_d6_final_approval.md
    - docs/retros/llm-dev-v1-adoption.md
    - frameworks/manifests/framework-learnings-v1.1-adoption.md
  forbidden_paths:
    # Any folio module NOT involved in digest composition
    - folio/enrich.py
    - folio/links.py
    - folio/provenance.py
    - folio/tracking/entities.py
    - folio/pipeline/
    # Other Tier-4 spec documents (digest touches them only via reference, not edit)
    - docs/specs/tier4_discovery_proposal_layer_spec.md
    - docs/specs/tier4_digest_design_spec.md
    # Adopter-only contract
    - frameworks/llm-dev-v1/
    - docs/product/
    - docs/architecture/
    - ontos/
    - .github/
    - Ontos_Context_Map.md
    - AGENTS.md
  forbidden_symbols:
    - "pickle.loads"
    - "eval("
  cardinality_assertions:
    - name: "folio digest command group registered"
      command: "python3 -c 'from folio.cli import cli; assert \"digest\" in cli.commands; print(1)'"
      expect: "eq:1"
    - name: "folio.digest module exports at least generate_daily_digest and generate_weekly_digest"
      command: "python3 -c 'import folio.digest as d; assert hasattr(d, \"generate_daily_digest\") and hasattr(d, \"generate_weekly_digest\"); print(1)'"
      expect: "eq:1"

artifacts:
  spec:              "docs/specs/v0.7.0_folio_digest_spec.md"
  family_verdict:    "docs/validation/v0.7.0_<phase>_<role>_<family>.md"
  canonical_verdict: "docs/validation/v0.7.0_<phase>_canonical_verdict.md"
  product_verdict:   "docs/validation/v0.7.0_<phase>_product_<family>.md"
  fix_summary:       "docs/validation/v0.7.0_d4_fix_summary.md"
  verification:      "docs/validation/v0.7.0_d5_verification.md"
  final_approval:    "docs/validation/v0.7.0_d6_final_approval.md"
  retro:             "docs/retros/llm-dev-v1-adoption.md"

# Model assignments (same pattern as slice 6a: codex adversarial, gemini alignment,
# claude-sub peer + product).
model_assignments:
  - phase: "A"
    assignments:
      claude: spec-author
  - phase: "B.1"
    assignments:
      codex:      adversarial
      gemini:     alignment
      claude-sub: peer
  - phase: "B.1"
    assignments:
      claude-sub: product
  - phase: "B.2"
    assignments:
      codex:      adversarial
      gemini:     alignment
      claude-sub: peer
  - phase: "B.2"
    assignments:
      claude-sub: product
  - phase: "B.3"
    assignments:
      codex: meta-consolidator
  - phase: "C"
    assignments:
      claude: implementation-author
  - phase: "D.2"
    assignments:
      codex:      adversarial
      gemini:     alignment
      claude-sub: peer
  - phase: "D.2"
    assignments:
      claude-sub: product
  - phase: "D.3"
    assignments:
      codex: meta-consolidator
  - phase: "D.4"
    assignments:
      claude: fix-author
  - phase: "D.5"
    assignments:
      gemini: verifier
  - phase: "D.6"
    assignments:
      codex: final-approval
  - phase: "E"
    assignments:
      claude: retro

cli_capability_matrix:
  claude:      { shell: true, git: true, test_runner: true,  doc_index: true  }
  claude-sub:  { shell: true, git: true, test_runner: true,  doc_index: true  }
  codex:       { shell: true, git: true, test_runner: true,  doc_index: false }
  gemini:      { shell: true, git: false, test_runner: false, doc_index: false }

smoke_checks:
  - phase: "C"
    checks:
      - name: "folio imports"
        command: "python3 -c 'import folio'"
        expect: "exit-0"
      - name: "digest module imports"
        command: "python3 -c 'import folio.digest'"
        expect: "exit-0"
      - name: "digest + scope-relevant test suites"
        command: "python3 -m pytest tests/test_digest.py tests/test_cli_digest.py -q"
        expect: "exit-0"
      - name: "lint clean on scope paths"
        command: "python3 -m ruff check folio/digest.py"
        expect: "exit-0"
  - phase: "D.6"
    checks:
      - name: "branch ahead of main"
        command: "git rev-list --count main..HEAD"
        expect: "gte:1"

regression_guards:
  - name: "Slice 1 links tests"
    command: "python3 -m pytest tests/test_links_cli.py -q"
    owns_deliverable_id: "proposal-review-hardening-v0-6-0"
  - name: "Slice 4 trust-gated tests"
    command: "python3 -m pytest tests/test_links_cli.py tests/test_graph_cli.py -q"
    owns_deliverable_id: "trust-gated-surfacing-v0-6-4"
  - name: "Entity registry tests"
    command: "python3 -m pytest tests/test_entities.py tests/test_cli_entities.py -q"
    owns_deliverable_id: "entity-registry"

gate_prerequisites:
  - id: G-test-1
    category: test
    description: "Full scope-relevant test suites pass."
    verification:
      command: "python3 -m pytest tests/test_digest.py tests/test_cli_digest.py tests/test_links_cli.py tests/test_graph_cli.py tests/test_entities.py tests/test_cli_entities.py -q"
      expect: "exit-0"
  - id: G-test-2
    category: test
    description: "Digest-specific tests pass."
    verification:
      command: "python3 -m pytest tests/test_digest.py tests/test_cli_digest.py -q"
      expect: "exit-0"
  - id: G-scope-1
    category: scope
    description: "No changes to forbidden paths."
    verification:
      command: "git diff --name-only main..HEAD | grep -E '^(folio/enrich\\.py|folio/links\\.py|folio/provenance\\.py|folio/tracking/entities\\.py|folio/pipeline/|docs/specs/tier4_|docs/product/|docs/architecture/|frameworks/llm-dev-v1/|AGENTS\\.md|Ontos_Context_Map\\.md)'"
      expect: "exit-nonzero"
  - id: G-scope-2
    category: scope
    description: "Forbidden symbols absent from scope-lock paths."
    verification:
      command: "grep -rE 'pickle\\.loads|eval\\(' folio/digest.py"
      expect: "exit-nonzero"
  - id: G-cardinality-1
    category: cardinality
    description: "folio digest command group registered."
    verification:
      command: "python3 -c 'from folio.cli import cli; assert \"digest\" in cli.commands; print(1)'"
      expect: "eq:1"
  - id: G-cardinality-2
    category: cardinality
    description: "folio.digest module exposes generate_daily_digest and generate_weekly_digest."
    verification:
      command: "python3 -c 'import folio.digest as d; assert hasattr(d, \"generate_daily_digest\") and hasattr(d, \"generate_weekly_digest\"); print(1)'"
      expect: "eq:1"
  - id: G-verdict-1
    category: verdict-presence
    description: "B.3 canonical spec verdict exists."
    verification:
      command: "test -f docs/validation/v0.7.0_spec_canonical_verdict.md"
      expect: "exit-0"
  - id: G-verdict-2
    category: verdict-presence
    description: "D.3 canonical code verdict exists."
    verification:
      command: "test -f docs/validation/v0.7.0_code_canonical_verdict.md"
      expect: "exit-0"
  - id: G-verdict-3
    category: verdict-presence
    description: "Product verdicts (B.1 + D.2) exist."
    verification:
      command: "ls docs/validation/v0.7.0_{spec,code}_product_claude-sub.md 2>/dev/null | wc -l | tr -d ' '"
      expect: "gte:2"
  - id: G-blocker-1
    category: blocker-closure
    description: "D.5 verification exists."
    verification:
      command: "test -f docs/validation/v0.7.0_d5_verification.md"
      expect: "exit-0"
  - id: G-branch-1
    category: branch
    description: "Working tree clean."
    verification:
      command: "git status --porcelain | grep -v '^??'"
      expect: "empty"
  - id: G-branch-2
    category: branch
    description: "Feature branch ahead of main."
    verification:
      command: "git rev-list --count main..HEAD"
      expect: "gte:1"

branch_map:
  default: "feat/folio-digest-v0-7-0-<PHASE_ID>-<ROLE>-<FAMILY>"

references:
  - path: "docs/specs/tier4_digest_design_spec.md"
    version: "rev 4"
    relevance: "Ratified Pre-A design spec — CLI contract §4, input predicates §5/§6, output path §7, frontmatter §8, body template §9, rerun/failure §10-11, trust §12."
  - path: "docs/specs/tier4_discovery_proposal_layer_spec.md"
    version: "rev 5"
    relevance: "Tier 4 graph-ops foundation — digest is a consumer per §15.6 slice 6b."
  - path: "docs/specs/v0.6.4_trust_gated_surfacing_spec.md"
    version: "post-slice-4"
    relevance: "Trust-gating contract (`review_status: flagged` + `--include-flagged` flag) that digest's daily predicate inherits."
  - path: "folio/links.py"
    version: "post-slice-6a"
    relevance: "Reference pattern for --include-flagged flag wiring + suppression-count disclosure. Read-only dependency; digest does not modify."
